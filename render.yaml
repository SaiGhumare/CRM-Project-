services:
  - type: web
    name: pms-backend
    runtime: node
    rootDir: pms-backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false # Set this manually in Render dashboard
      - key: CORS_ORIGIN
        sync: false # Set to your Vercel URL, e.g. https://pms-sandip.vercel.app
